name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-dmg:
    runs-on: macos-26          # arm64-native, free on public repos
    env:
      # `secrets` cannot be used directly in `if:`; expose it as an env flag instead.
      HAS_SIGNING: ${{ secrets.MAC_CERT_P12 != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.app || true

      - name: Install tools
        run: brew install xcodegen create-dmg

      - name: Build universal app + DMG (ad-hoc)
        run: bash scripts/build-release.sh   # SIGN_ID="-" → no secrets required

      # ---- Optional notarized build (runs only when secrets are set) ----
      - name: Import Developer ID certificate
        if: ${{ env.HAS_SIGNING == 'true' }}
        env:
          MAC_CERT_P12: ${{ secrets.MAC_CERT_P12 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
        run: |
          echo "$MAC_CERT_P12" | base64 --decode > cert.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import cert.p12 -k build.keychain -P "$MAC_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          rm -f cert.p12

      - name: Rebuild signed + notarize
        if: ${{ env.HAS_SIGNING == 'true' }}
        env:
          SIGN_ID: ${{ secrets.MAC_SIGN_IDENTITY }}
          AC_API_KEY_ID: ${{ secrets.AC_API_KEY_ID }}
          AC_API_ISSUER: ${{ secrets.AC_API_ISSUER }}
          AC_API_KEY_P8: ${{ secrets.AC_API_KEY_P8 }}
        run: |
          echo "$AC_API_KEY_P8" > AuthKey.p8
          xcrun notarytool store-credentials AC_NOTARY \
            --key AuthKey.p8 --key-id "$AC_API_KEY_ID" --issuer "$AC_API_ISSUER"
          bash scripts/build-release.sh
          bash scripts/notarize.sh "build/Video Downloader.dmg"
          rm -f AuthKey.p8

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: VideoDownloader-dmg
          path: build/*.dmg

      - name: Attach DMG to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/*.dmg
