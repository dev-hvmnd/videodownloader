name: VideoDownloader

options:
  bundleIdPrefix: io.dev-hvmnd.videodownloader
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.2.0"
    CURRENT_PROJECT_VERSION: "2"
    # Signing: ad-hoc by default (buildable without an Apple account).
    # Overridden for Developer ID releases via CI/env.
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: YES
    DEAD_CODE_STRIPPING: YES
    SWIFT_STRICT_CONCURRENCY: complete
  configs:
    # Debug: active arch only → fast local builds and avoids x86_64 SPM module
    # resolution issues on Apple Silicon. Release: universal (Intel + Apple Silicon).
    Debug:
      ONLY_ACTIVE_ARCH: YES
    Release:
      ARCHS: "arm64 x86_64"
      ONLY_ACTIVE_ARCH: NO

packages:
  YTDLPKit:
    path: Packages/YTDLPKit

targets:
  VideoDownloader:
    type: application
    platform: macOS
    sources:
      - path: App
        excludes:
          - "Info.plist"
          - "VideoDownloader.entitlements"
    dependencies:
      - package: YTDLPKit
        product: YTDLPEngine
      - package: YTDLPKit
        product: Toolchain
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.dev-hvmnd.videodownloader.app
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/VideoDownloader.entitlements
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_USER_SCRIPT_SANDBOXING: YES

  VideoDownloaderTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/AppTests
    dependencies:
      - target: VideoDownloader
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES

schemes:
  VideoDownloader:
    build:
      targets:
        VideoDownloader: all
        VideoDownloaderTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - VideoDownloaderTests
